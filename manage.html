<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Birthdays ⚙️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="manage-page">
  <div class="manage-container">
    <a href="index.html" class="back-link">← Back to Portal</a>
    <h1 class="manage-title">🎂 Birthday Manager</h1>
    <p class="manage-sub">Add names and personal messages. When a matching name is entered on the main page, their surprise appears!</p>

    <div class="add-form">
      <h2>Add / Update a Person</h2>
      <label>Name (case-insensitive)</label>
      <input type="text" id="mgName" placeholder="e.g. Priya"/>
      <label>Custom Message (optional)</label>
      <textarea id="mgMessage" rows="3" placeholder="Write a heartfelt birthday message…"></textarea>
      <label>Age (optional)</label>
      <input type="number" id="mgAge" placeholder="e.g. 25" min="1" max="120"/>
      <label>Photo (optional)</label>
      <div class="photo-input-row">
        <input type="text" id="mgPhoto" placeholder="images/yourphoto.jpg  or  https://…"/>
        <span class="photo-hint">Put your image in the <code>images/</code> folder</span>
      </div>
      <button class="add-btn" onclick="addPerson()">💾 Save</button>
      <p class="save-status" id="saveStatus"></p>
    </div>

    <div class="people-list">
      <h2>Current Birthday People</h2>
      <div id="listContainer"></div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>renderList();</script>
</body>
</html>
